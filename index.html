<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartFridge – Intelligente Kühlschrankverwaltung</title>
    <meta name="description" content="SmartFridge ist eine Progressive Web App zur intelligenten Verwaltung deines Kühlschranks mit Barcode-Scanner, Ablaufdatum-Tracking und KI-Rezeptgenerator." />

    <meta property="og:title" content="SmartFridge – Intelligente Kühlschrankverwaltung" />
    <meta property="og:description" content="Verwalte deinen Kühlschrank smart – mit Barcode-Scanner, Ablaufdatum-Tracking und KI-Rezeptvorschlägen." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // Auto dark mode based on system preference
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        document.documentElement.classList.toggle('dark', e.matches);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
