      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was ist SmartFridge – und für wen ist die Kühlschrank App gedacht?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SmartFridge ist eine kostenlose Kühlschrank App zur intelligenten Verwaltung deiner Lebensmittel. Mit dem integrierten Barcode-Scanner kannst du Produkte erfassen, Ablaufdaten tracken und dir KI-basierte Rezeptvorschläge generieren lassen. Die App richtet sich an technikaffine Haushalte, Familien und Studenten-WGs, die Lebensmittelverschwendung vermeiden möchten."
          }
        },
        {
          "@type": "Question",
          "name": "Ist SmartFridge wirklich kostenlos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, SmartFridge ist vollständig kostenlos und Open Source. Der Quellcode ist auf GitHub verfügbar – ideal für Studierende und alle, die eine kostenlose Lösung zum Lebensmittel verwalten suchen."
          }
        },
        {
          "@type": "Question",
          "name": "Wie funktioniert die Ablaufdatum App?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Du scannst ein Produkt per Barcode oder gibst es manuell ein und trägst das Ablaufdatum ein. SmartFridge zeigt dir mit farblichen Warnungen an, welche Produkte bald ablaufen – so kannst du Lebensmittelverschwendung vermeiden und rechtzeitig verbrauchen."
          }
        },
        {
          "@type": "Question",
          "name": "Wie funktioniert der Rezeptgenerator mit KI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der Rezeptgenerator analysiert die Zutaten in deinem Kühlschrank und erstellt mithilfe von Gemini AI passende Rezeptvorschläge. So kannst du kochen, was du hast – ohne extra einkaufen zu müssen. Das spart Geld und hilft, Lebensmittelverschwendung zu vermeiden."
          }
        },
        {
          "@type": "Question",
          "name": "Können mehrere Personen SmartFridge nutzen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, SmartFridge bietet ein Mehrbenutzersystem mit Login, Passwortverwaltung und Admin-Modus. Perfekt für Familien oder Studenten-WGs, in denen mehrere Personen den Kühlschrank gemeinsam verwalten möchten."
          }
        }
      ]
    }
